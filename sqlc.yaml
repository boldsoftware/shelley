version: "2"
sql:
  - engine: "sqlite"
    queries: "db/query/"
    schema:
      - "db/schema/"
      # Stubs for things sqlc's parser doesn't understand (e.g. FTS5
      # virtual tables and their hidden rank / MATCH columns). Loaded
      # after db/schema/ so the real migrations win at runtime.
      - "db/sqlc-stubs/"
    gen:
      go:
        package: "generated"
        out: "db/generated/"
        emit_json_tags: true
        emit_empty_slices: true
        emit_pointers_for_null_types: true
        json_tags_case_style: "snake"
        omit_unused_structs: true
